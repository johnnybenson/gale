name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            binary: gale
          - platform: darwin-x64
            runner: macos-latest
            target: x86_64-apple-darwin
            binary: gale
          - platform: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: gale
          - platform: linux-arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: gale
            use_cross: true
          - platform: win32-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: gale.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to platform package
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
             "npm/platforms/${{ matrix.platform }}/${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.platform }}
          path: npm/platforms/${{ matrix.platform }}/

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy binaries to npm packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            cp -r "artifacts/platform-${platform}/"* "npm/platforms/${platform}/"
          done

      - name: Set executable permissions
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            chmod +x "npm/platforms/${platform}/gale"
          done

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set package versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update platform packages
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            cd "npm/platforms/${platform}"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            cd ../../..
          done
          # Update main package and its optionalDependencies
          cd npm/gale
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e "
            const pkg = require('./package.json');
            for (const dep of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[dep] = '$VERSION';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cd ../..

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            echo "Publishing @aspect/gale-${platform}..."
            cd "npm/platforms/${platform}"
            npm publish --access public
            cd ../../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/gale
          npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
